# La imagen base de Nixpacks trae Python pero no pip. Forzamos su instalación
# vía nixPkgs en la fase setup, y luego corremos pip explícitamente sobre
# requirements.txt de la raíz (que incluye todas las deps del backend).

[phases.setup]
# 'cairo' + 'pkg-config' son necesarios para compilar pycairo, dependencia
# transitiva de xhtml2pdf via svglib > rlpycairo. Sin esto, pip falla en
# meson setup con "Run-time dependency cairo found: NO". Detectado el 2-may-2026
# tras agregar xhtml2pdf en commit 3441c85.
nixPkgs = ["python311", "python311Packages.pip", "python311Packages.virtualenv", "gcc", "pkg-config", "cairo"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install -r requirements.txt"
]

[start]
cmd = "cd backend && . /opt/venv/bin/activate && python -m uvicorn app:app --host 0.0.0.0 --port $PORT"
